name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle app with PyInstaller
        run: pyinstaller industry_news.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" `
            "/DAppVersion=$version" `
            "installer\industry_news.iss"

      - name: Rename installer to include version number
        run: |
          Rename-Item `
            "installer\Output\IndustryNews-Setup.exe" `
            "IndustryNews-Setup-${{ github.ref_name }}.exe"

      - name: Upload Windows installer to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Industry News ${{ github.ref_name }}"
          generate_release_notes: true
          files: installer/Output/IndustryNews-Setup-${{ github.ref_name }}.exe

