name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle app with PyInstaller
        run: pyinstaller industry_news.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe" `
            "/DAppVersion=$version" `
            "installer\industry_news.iss"

      - name: Rename installer to include version number
        run: |
          Rename-Item `
            "installer\Output\IndustryNews-Setup.exe" `
            "IndustryNews-Setup-${{ github.ref_name }}.exe"

      - name: Upload Windows installer to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Industry News ${{ github.ref_name }}"
          generate_release_notes: true
          files: installer/Output/IndustryNews-Setup-${{ github.ref_name }}.exe

  build-macos:
    name: macOS disk image
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle app with PyInstaller
        run: pyinstaller industry_news_mac.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS disk image
        run: |
          create-dmg \
            --volname "Industry News" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "IndustryNews.app" 175 190 \
            --hide-extension "IndustryNews.app" \
            --app-drop-link 425 185 \
            "IndustryNews-${{ github.ref_name }}.dmg" \
            "dist/IndustryNews.app"

      - name: Upload macOS DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Industry News ${{ github.ref_name }}"
          generate_release_notes: true
          files: IndustryNews-${{ github.ref_name }}.dmg
